{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
  <div class="col-md-5">
    <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
      <div class="card-body p-5 bg-white">
        <!-- Logo -->
        <div class="text-center mb-4">
          <div class="d-inline-flex align-items-center justify-content-center bg-warning bg-opacity-10 text-warning rounded-circle mb-3" style="width: 70px; height: 70px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" fill="currentColor" class="bi bi-person-badge-fill text-warning-emphasis" viewBox="0 0 16 16">
              <path d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2zm4.5 0a.5.5 0 0 0 0 1h3a.5.5 0 0 0 0-1zM8 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6m5 2.755C12.146 12.825 10.623 12 8 12s-4.146.826-5 1.755V14a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1z"/>
            </svg>
          </div>
          <h3 class="fw-bold mb-1">Worker Login</h3>
          <p class="text-muted small">Sign in using your approved supermarket Gmail account.</p>
        </div>

        {% if error %}
          <div class="alert alert-danger py-2 small mb-3">{{ error }}</div>
        {% endif %}

        <form method="post">
          <div class="mb-4">
            <label class="form-label fw-semibold small">Approved Gmail Address</label>
            <input type="email" name="email" class="form-control py-2.5 rounded-3" placeholder="worker@gmail.com" required />
          </div>
          <button class="btn btn-warning w-100 py-2.5 rounded-3 fw-bold shadow">
            Sign In
          </button>
        </form>

        <div class="mt-4 pt-3 border-top">
          <h6 class="fw-bold text-uppercase text-secondary small mb-2">Approved Demo Accounts:</h6>
          <ul class="list-unstyled mb-0 small text-muted">
            <li class="mb-1"><strong>Active:</strong> <code>john.doe@gmail.com</code></li>
            <li class="mb-1"><strong>Active:</strong> <code>jane.smith@gmail.com</code></li>
            <li><strong>Inactive:</strong> <code>bob.brown@gmail.com</code></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
