{% extends "base.html" %}
{% block content %}
  <div class="card">
    <div class="card-body">
      <h3 class="card-title">Profile</h3>
      <p><strong>Name:</strong> {{ worker['name'] }}</p>
      <p><strong>Email:</strong> {{ worker['email'] }}</p>
      <p><strong>Status:</strong> {{ worker['status'] }}</p>
      <p><strong>Total Updates Made:</strong> {{ total_updates }}</p>
      <a class="btn btn-secondary" href="{{ url_for('worker.dashboard') }}">Back to Dashboard</a>
    </div>
  </div>
{% endblock %}
