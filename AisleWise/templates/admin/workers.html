{% extends "base.html" %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2>Worker Management</h2>
      <p class="text-muted">View and manage worker accounts.</p>
    </div>
    <div>
      <a class="btn btn-success" href="{{ url_for('admin.add_worker') }}">Add Worker</a>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      {% if workers %}
        <table class="table">
          <thead><tr><th>Name</th><th>Email</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {% for w in workers %}
              <tr>
                <td>{{ w['name'] }}</td>
                <td>{{ w['email'] }}</td>
                <td>{{ w['status'] }}</td>
                <td>
                  <form method="post" action="{{ url_for('admin.toggle_worker', worker_id=w['id']) }}">
                    <button class="btn btn-sm btn-outline-primary">Toggle Status</button>
                  </form>
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      {% else %}
        <p class="text-muted">No workers found.</p>
      {% endif %}
    </div>
  </div>
{% endblock %}
