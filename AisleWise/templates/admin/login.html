{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
  <div class="col-md-5">
    <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
      <div class="card-body p-5 bg-white">
        <!-- Logo -->
        <div class="text-center mb-4">
          <div class="d-inline-flex align-items-center justify-content-center bg-danger bg-opacity-10 text-danger rounded-circle mb-3" style="width: 70px; height: 70px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" fill="currentColor" class="bi bi-shield-lock-fill text-danger-emphasis" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99a11.8 11.8 0 0 0 2.517 2.453c.386.273.744.482 1.048.625.28.132.581.24.829.24s.548-.108.829-.24a7 7 0 0 0 1.048-.625 11.8 11.8 0 0 0 2.517-2.453c1.678-2.195 3.061-5.513 2.465-9.99a1.54 1.54 0 0 0-1.044-1.263 62 62 0 0 0-2.887-.87C9.843.266 8.69 0 8 0m0 5a1.5 1.5 0 0 1 .5 2.915a1.5 1.5 0 1 1-1-.005A1.5 1.5 0 0 1 8 5m0 2.086a.5.5 0 0 0-.25.06l-.5.29a.5.5 0 1 0 .5.866l.25-.145v.903a.5.5 0 1 0 1 0v-.903l.25.145a.5.5 0 1 0 .5-.866l-.5-.29A.5.5 0 0 0 8 7.086"/>
            </svg>
          </div>
          <h3 class="fw-bold mb-1">Admin Portal</h3>
          <p class="text-muted small">Access supermarket inventory and workers configuration.</p>
        </div>

        {% if error %}
          <div class="alert alert-danger py-2 small mb-3">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('admin.login') }}">
          <div class="mb-3">
            <label for="store_id" class="form-label fw-semibold small">Store ID</label>
            <input type="text" class="form-control py-2 rounded-3" id="store_id" name="store_id" required>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold small">Password</label>
            <input type="password" class="form-control py-2 rounded-3" id="password" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2.5 rounded-3 fw-bold shadow">
            Authenticate
          </button>
        </form>

        <div class="mt-4 pt-3 border-top text-center bg-light p-3 rounded-3">
          <h6 class="fw-bold text-uppercase text-secondary small mb-1">Store Admin Credentials:</h6>
          <div class="small text-muted">
            Store ID: <code>admin</code><br>
            Password: <code>password123</code>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
